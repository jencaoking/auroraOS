name: Build and Measure Metrics

on:
  push:
    branches: [ main, miband ]
  pull_request:
    branches: [ main, miband ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: gcc-arm-none-eabi cmake qemu-system-arm python3 make python3-pip clang-tidy cppcheck lcov gcc g++
        version: 1.0
    
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi cmake qemu-system-arm python3 make python3-pip clang-tidy cppcheck lcov gcc g++
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install Python dependencies
      run: pip3 install -r requirements.txt
    
    - name: Cache GoogleTest
      uses: actions/cache@v4
      id: cache-gtest
      with:
        path: build_host/_deps
        key: gtest-${{ hashFiles('tests/CMakeLists.txt') }}
    
    - name: Static Analysis
      run: |
        clang-tidy --checks='-*,cppcoreguidelines-*,readability-*,bugprone-*' kernel/*.cpp || true
        cppcheck --enable=all --inconclusive --std=c++11 kernel/*.cpp || true
        
    - name: Configure CMake (Host Test Build)
      run: |
        mkdir -p build_host && cd build_host
        cmake -DAURORA_HOST_TEST=ON -DENABLE_COVERAGE=ON ../tests
        
    - name: Build and Run Host Tests (Coverage)
      run: |
        cd build_host
        make -j8
        ./aurora_tests
        lcov --capture --directory . --output-file coverage.info
        genhtml coverage.info --output-directory coverage_report
        
    - name: Configure CMake (Target Build)
      run: |
        mkdir -p build_target && cd build_target
        cmake -DBOARD=lm3s6965-qb -DCMAKE_TOOLCHAIN_FILE=../config/toolchain.cmake ..
      
    - name: Build Target
      run: |
        cd build_target
        make -j8
      
    - name: Run QEMU and Collect Metrics
      run: |
        cd build_target
        timeout 30s qemu-system-arm -M lm3s6965evb -cpu cortex-m4 -nographic -icount shift=3,align=on -rtc clock=vm -kernel auroraOS.elf -semihosting | tee ../metrics.log || true
        
    - name: Parse Metrics
      run: python3 scripts/parse_metrics.py metrics.log --md report.md
      
    - name: Run HIL Script
      run: |
        cd build_target
        python3 ../scripts/hil_runner.py
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          report.md
          build_target/auroraOS.elf
          build_host/coverage_report/

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: build_and_test
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build_target/auroraOS.elf
          body: "Manual build release of auroraOS"