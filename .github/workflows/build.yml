name: Build and Measure Metrics

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi cmake qemu-system-arm python3 make python3-pip
        pip3 install kconfiglib
        
    - name: Configure CMake
      run: cmake -DBOARD=lm3s6965-qb .
      
    - name: Build
      run: make -j8
      
    - name: Run QEMU and Collect Metrics
      run: |
        timeout 30s qemu-system-arm -M lm3s6965evb -cpu cortex-m4 -nographic -icount shift=3,align=on -rtc clock=vm -kernel auroraOS.elf -semihosting | tee metrics.log || true
        
    - name: Parse Metrics
      run: python3 scripts/parse_metrics.py metrics.log --md report.md
      
    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: metrics-report
        path: report.md
